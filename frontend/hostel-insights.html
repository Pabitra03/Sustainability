<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.theme==="dark"||(!localStorage.theme&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}</script>
  <style>html { background-color: #050505 !important; } html:not(.dark) { background-color: #fafafa !important; }</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability | Hostel Insights</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: { 50: '#f7fee7', 100: '#ecfccb', 500: '#84cc16', 600: '#65a30d', 900: '#365314' }, secondary: { 500: '#3b82f6' } }, fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#fafafa] dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div id="app-shell" class="w-full h-full">
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Hostel Insights</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Mess nutrition, protein, budget, and health trends from your logs.</p>
      </div>
      <a href="hostel.html" class="bg-primary-500 hover:bg-primary-600 text-black px-4 py-2 rounded-lg text-sm font-bold self-start sm:self-auto">Mess Builder</a>
    </div>

    <div id="insights-error" class="hidden rounded-lg border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/20 p-4 mb-6 text-sm font-bold text-red-700 dark:text-red-300"></div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <p class="text-xs uppercase font-black text-gray-400">Hostel Score</p>
        <p id="score" class="text-3xl font-black text-primary-500 mt-1">--</p>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <p class="text-xs uppercase font-black text-gray-400">Avg Protein</p>
        <p id="avg-protein" class="text-3xl font-black text-gray-900 dark:text-white mt-1">--</p>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <p class="text-xs uppercase font-black text-gray-400">Avg Calories</p>
        <p id="avg-calories" class="text-3xl font-black text-gray-900 dark:text-white mt-1">--</p>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <p class="text-xs uppercase font-black text-gray-400">Weekly Grocery</p>
        <p id="weekly-cost" class="text-3xl font-black text-gray-900 dark:text-white mt-1">--</p>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">Protein Trend</h2>
        <canvas id="protein-chart" height="150"></canvas>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">Calorie Trend</h2>
        <canvas id="calorie-chart" height="150"></canvas>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mt-6">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">Recent Mess Foods</h2>
        <div id="recent-foods" class="space-y-2"></div>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">AI Insights</h2>
        <div id="ai-insights" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=3"></script>
  <script>
    const userId = getUserId();
    let proteinChart = null;
    let calorieChart = null;

    function dateKey(value) {
      return String(value || '').slice(0, 10);
    }

    function renderChart(id, existing, labels, values, target, label, color) {
      if (existing) existing.destroy();
      return new Chart(document.getElementById(id), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label, data: values, borderColor: color, backgroundColor: color + '22', tension: 0.35, fill: true },
            { label: 'Target', data: labels.map(() => target), borderColor: '#9ca3af', borderDash: [5, 5], pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: document.documentElement.classList.contains('dark') ? '#e5e7eb' : '#111827' } } },
          scales: {
            x: { ticks: { color: '#6b7280', maxTicksLimit: 6 }, grid: { color: 'rgba(148,163,184,0.15)' } },
            y: { ticks: { color: '#6b7280' }, grid: { color: 'rgba(148,163,184,0.15)' } }
          }
        }
      });
    }

    function row(left, right, subtext = '') {
      return `
        <div class="flex items-center justify-between gap-3 rounded-lg bg-gray-50 dark:bg-gray-900 p-3">
          <div>
            <p class="text-sm font-black text-gray-900 dark:text-white">${left}</p>
            ${subtext ? `<p class="text-xs text-gray-500 dark:text-gray-400">${subtext}</p>` : ''}
          </div>
          <p class="text-sm font-black text-primary-500">${right}</p>
        </div>
      `;
    }

    async function loadInsights() {
      if (!userId) { window.location.href = 'auth.html'; return; }
      try {
        showAppLoading('Loading hostel insights...');
        const res = await fetch(`${API_BASE_URL}/hostel/insights?user_id=${userId}`);
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 403) window.location.href = 'dashboard.html';
          throw new Error(data.error || 'Unable to load hostel insights');
        }

        const metrics = data.metrics || [];
        const labels = metrics.map(item => dateKey(item.entry_date));
        const protein = metrics.map(item => item.protein_g || 0);
        const calories = metrics.map(item => item.calories || 0);
        const averages = data.averages || {};
        const score = data.hostel_health_score || {};
        const budget = data.budget_plan || {};

        document.getElementById('score').textContent = score.score ?? '--';
        document.getElementById('avg-protein').textContent = averages.protein_g ? `${averages.protein_g}g` : '--';
        document.getElementById('avg-calories').textContent = averages.calories || '--';
        document.getElementById('weekly-cost').textContent = budget.weekly_cost !== undefined ? `Rs ${budget.weekly_cost}` : '--';

        proteinChart = renderChart('protein-chart', proteinChart, labels, protein, averages.target_protein_g || 0, 'Protein', '#84cc16');
        calorieChart = renderChart('calorie-chart', calorieChart, labels, calories, averages.target_calories || 0, 'Calories', '#3b82f6');

        document.getElementById('recent-foods').innerHTML = (data.recent_mess_foods || []).slice(-8).reverse().map(item =>
          row(`${item.meal_type}: ${item.items}`, `${Math.round(item.protein_g || 0)}g`, `${Math.round(item.calories || 0)} kcal`)
        ).join('') || '<p class="text-sm text-gray-500 dark:text-gray-400">No mess meals consumed yet.</p>';

        document.getElementById('ai-insights').innerHTML = (data.ai_insights || []).map(item =>
          `<div class="rounded-lg bg-gray-50 dark:bg-gray-900 p-3 text-sm font-bold text-gray-700 dark:text-gray-300">${item}</div>`
        ).join('');
      } catch (err) {
        const el = document.getElementById('insights-error');
        el.textContent = err.message;
        el.classList.remove('hidden');
      } finally {
        hideAppLoading();
        feather.replace();
      }
    }

    document.addEventListener('DOMContentLoaded', loadInsights);
  </script>
</body>
</html>
