<!DOCTYPE html>
<html lang="en">
<head>

  <script>if(localStorage.theme==="dark"||(!localStorage.theme&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}</script>
    <style>
        html { background-color: #050505 !important; }
        html:not(.dark) { background-color: #fafafa !important; }
    </style>






  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability | Workout Plan</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: { 50: '#f7fee7', 100: '#ecfccb', 500: '#84cc16', 600: '#65a30d', 900: '#365314' }, secondary: { 500: '#3b82f6' } }, fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-[#fafafa] dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen ">


  <div id="app-shell" class="w-full h-full">
    <div class="mb-6 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Workout Plan</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Your metabolic training protocol</p>
      </div>
      <button id="start-all-btn" onclick="startAllExercises()" class="hover-scale bg-primary-500 hover:bg-primary-600 text-black px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
        <i data-feather="play-circle" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Start All</span>
      </button>
    </div>

    <div id="loading" class="flex justify-center items-center py-20">
      <i data-feather="loader" class="w-8 h-8 animate-spin text-primary-500"></i>
    </div>

    <div id="workout-content" class="hidden">
      
      <div class="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 p-4 mb-8 rounded-r-lg">
        <div class="flex">
          <div class="flex-shrink-0">
            <i data-feather="info" class="h-5 w-5 text-blue-400"></i>
          </div>
          <div class="ml-3">
            <p class="text-sm text-blue-700 dark:text-blue-300">
              <strong>Today's Routine:</strong> <span id="today-routine">Loading</span>. 
              Complete all designated exercises to maintain your streak.
            </p>
          </div>
        </div>
      </div>

      <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Exercises</h3>
      
      <div class="space-y-4" id="exercises-container">
        <!-- Exercises injected here -->
      </div>
    </div>
  </div>

  <!-- WORKOUT TIMER MODAL -->
  <div id="workout-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
      <h3 id="modal-exercise-name" class="text-2xl font-black text-gray-900 dark:text-white mb-1">Push Ups</h3>
      <p id="modal-exercise-info" class="text-sm text-gray-500 dark:text-gray-400 mb-6">3 sets × 12 reps</p>

      <!-- Circular timer -->
      <div class="relative w-32 h-32 mx-auto mb-6">
        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8"/>
          <circle id="timer-ring" cx="50" cy="50" r="45" fill="none" stroke="#84cc16" stroke-width="8"
              stroke-dasharray="282.7" stroke-dashoffset="0" stroke-linecap="round"
              style="transition: stroke-dashoffset 1s linear;"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
          <span id="timer-display" class="text-4xl font-black text-gray-900 dark:text-white">60</span>
        </div>
      </div>

      <p id="modal-status" class="text-sm text-primary-500 font-bold uppercase tracking-widest mb-6">Ready to start</p>

      <div class="flex gap-3 justify-center">
        <button onclick="closeWorkoutModal()" class="px-5 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
        <button id="modal-action-btn" onclick="toggleTimer()" class="px-6 py-2 rounded-lg bg-primary-500 hover:bg-primary-600 text-black text-sm font-bold transition-colors">Start</button>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=2"></script>
  <script>
    
    let timerInterval = null;
    let timerRunning = false;
    let timerSeconds = 60;
    let totalSeconds = 60;
    let currentExerciseQueue = [];
    let currentQueueIndex = 0;

    function openWorkoutModal(name, info, durationSec) {
      totalSeconds = durationSec || 60;
      timerSeconds = totalSeconds;
      timerRunning = false;
      clearInterval(timerInterval);

      document.getElementById('modal-exercise-name').textContent = name;
      document.getElementById('modal-exercise-info').textContent = info;
      document.getElementById('timer-display').textContent = timerSeconds;
      document.getElementById('modal-status').textContent = 'Ready to start';
      document.getElementById('modal-action-btn').textContent = 'Start';
      updateRing(timerSeconds);

      document.getElementById('workout-modal').classList.remove('hidden');
      document.getElementById('workout-modal').classList.add('flex');
    }

    function closeWorkoutModal() {
      clearInterval(timerInterval);
      timerRunning = false;
      currentExerciseQueue = [];
      document.getElementById('workout-modal').classList.add('hidden');
      document.getElementById('workout-modal').classList.remove('flex');
    }

    function updateRing(remaining) {
      const circumference = 282.7;
      const offset = circumference * (1 - remaining / totalSeconds);
      document.getElementById('timer-ring').style.strokeDashoffset = offset;
    }

    function toggleTimer() {
      if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('modal-action-btn').textContent = 'Resume';
        document.getElementById('modal-status').textContent = 'Paused';
      } else {
        timerRunning = true;
        document.getElementById('modal-action-btn').textContent = 'Pause';
        document.getElementById('modal-status').textContent = '🔥 In Progress...';
        timerInterval = setInterval(() => {
          timerSeconds--;
          document.getElementById('timer-display').textContent = timerSeconds;
          updateRing(timerSeconds);
          if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('modal-status').textContent = '✅ Complete!';
            document.getElementById('modal-action-btn').textContent = 'Done';
            document.getElementById('modal-action-btn').onclick = () => {
              closeWorkoutModal();
              
              if (currentExerciseQueue.length > 0) {
                currentQueueIndex++;
                if (currentQueueIndex < currentExerciseQueue.length) {
                  const next = currentExerciseQueue[currentQueueIndex];
                  setTimeout(() => openWorkoutModal(next.name, next.info, next.secs), 500);
                }
              }
            };
          }
        }, 1000);
      }
    }

    
    function parseDurationSecs(str) {
      if (!str) return 60;
      const secMatch = str.match(/(\d+)\s*sec/i);
      if (secMatch) return parseInt(secMatch[1]) * 3;
      const minMatch = str.match(/(\d+)\s*min/i);
      if (minMatch) return parseInt(minMatch[1]) * 60;
      return 60;
    }

    
    function startAllExercises() {
      const cards = document.querySelectorAll('.exercise-card');
      if (cards.length === 0) { alert('Exercises not loaded yet, please wait.'); return; }
      currentExerciseQueue = [];
      currentQueueIndex = 0;
      cards.forEach(card => {
        currentExerciseQueue.push({
          name: card.dataset.name,
          info: card.dataset.info,
          secs: parseDurationSecs(card.dataset.info)
        });
      });
      openWorkoutModal(
        currentExerciseQueue[0].name,
        currentExerciseQueue[0].info,
        currentExerciseQueue[0].secs
      );
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const userId = getUserId();
      if (!userId) { window.location.href = 'auth.html'; return; }

      try {
        const res = await fetch(`${API_BASE_URL}/dashboard?user_id=${userId}`);
        if (!res.ok) throw new Error('Need profile');
        const data = await res.json();
        
        const dayIndex = new Date().getDay();
        const adjustedIndex = dayIndex === 0 ? 6 : dayIndex - 1; 
        const todayRoutineText = data.weekly_plan[adjustedIndex].workout;
        
        document.getElementById('today-routine').textContent = todayRoutineText;

        const exercises = [];
        if (todayRoutineText.toLowerCase().includes('cardio') || todayRoutineText.toLowerCase().includes('rest')) {
          exercises.push({ name: 'Running / Light Jog', duration: '20 min', difficulty: 'Beginner', burn: '200 kcal' });
          exercises.push({ name: 'Active Stretching', duration: '15 min', difficulty: 'Beginner', burn: '50 kcal' });
        } else if (todayRoutineText.toLowerCase().includes('upper')) {
          exercises.push({ name: 'Push Ups', duration: '3 sets × 12 reps', difficulty: 'Intermediate', burn: '120 kcal' });
          exercises.push({ name: 'Pull Ups', duration: '3 sets × 8 reps', difficulty: 'Advanced', burn: '150 kcal' });
          exercises.push({ name: 'Dumbbell Rows', duration: '3 sets × 12 reps', difficulty: 'Intermediate', burn: '100 kcal' });
        } else if (todayRoutineText.toLowerCase().includes('lower')) {
          exercises.push({ name: 'Squats', duration: '4 sets × 15 reps', difficulty: 'Intermediate', burn: '200 kcal' });
          exercises.push({ name: 'Lunges', duration: '3 sets × 12 reps', difficulty: 'Intermediate', burn: '150 kcal' });
          exercises.push({ name: 'Calf Raises', duration: '4 sets × 20 reps', difficulty: 'Beginner', burn: '80 kcal' });
        } else {
          exercises.push({ name: 'Push Ups', duration: '3 sets × 12 reps', difficulty: 'Intermediate', burn: '120 kcal' });
          exercises.push({ name: 'Core Plank', duration: '3 sets × 60 sec', difficulty: 'Intermediate', burn: '100 kcal' });
        }

        const container = document.getElementById('exercises-container');
        const diffColors = {
          'Beginner': 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300',
          'Intermediate': 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300',
          'Advanced': 'bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300'
        };

        exercises.forEach((ex, idx) => {
          const diffClass = diffColors[ex.difficulty] || diffColors['Beginner'];
          const secs = parseDurationSecs(ex.duration);
          const card = document.createElement('div');
          card.className = 'exercise-card bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between shadow-sm hover-scale group';
          card.dataset.name = ex.name;
          card.dataset.info = ex.duration;
          card.innerHTML = `
            <div class="flex items-center gap-4 mb-4 sm:mb-0">
              <div class="w-12 h-12 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center font-bold text-gray-500">${idx + 1}</div>
              <div>
                <h4 class="font-bold text-gray-900 dark:text-white text-lg">${ex.name}</h4>
                <div class="flex items-center gap-3 text-sm text-gray-500 mt-1">
                  <span class="flex items-center gap-1"><i data-feather="clock" class="w-3 h-3"></i> ${ex.duration}</span>
                  <span class="flex items-center gap-1"><i data-feather="zap" class="w-3 h-3 text-primary-500"></i> ${ex.burn}</span>
                </div>
              </div>
            </div>
            <div class="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${diffClass}">${ex.difficulty}</span>
              <button onclick="openWorkoutModal('${ex.name}', '${ex.duration}', ${secs})" class="bg-primary-500 hover:bg-primary-600 text-black px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                Start Session
              </button>
            </div>
          `;
          container.appendChild(card);
        });

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('workout-content').classList.remove('hidden');
        feather.replace();

      } catch (err) {
        console.error("Workout Init Error:", err);
        if (err.message === 'Need profile') {
          window.location.href = 'profile.html';
        }
      }
    });
  </script>
</body>
</html>
