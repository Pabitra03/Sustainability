<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.theme==="dark"||(!localStorage.theme&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}</script>
  <style>html { background-color: #050505 !important; } html:not(.dark) { background-color: #fafafa !important; }</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability | Hostel Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: { 50: '#f7fee7', 100: '#ecfccb', 500: '#84cc16', 600: '#65a30d', 900: '#365314' }, secondary: { 500: '#3b82f6' } }, fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-[#fafafa] dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div id="app-shell" class="w-full h-full">
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Hostel Mode</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Track mess meals and convert hostel food into usable nutrition data.</p>
      </div>
      <button onclick="saveMenu()" class="bg-primary-500 hover:bg-primary-600 text-black px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 self-start sm:self-auto">
        <i data-feather="save" class="w-4 h-4"></i>
        Save Menu
      </button>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <div class="xl:col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">Today's Mess Menu</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs text-gray-400 uppercase font-black tracking-wider mb-2">Breakfast</label>
            <textarea id="breakfast" rows="5" placeholder="Poha, eggs, tea..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg dark:bg-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"></textarea>
            <div class="flex gap-2 mt-2">
              <button onclick="analyzeMeal('breakfast', false)" class="flex-1 bg-gray-100 dark:bg-gray-900 text-gray-700 dark:text-gray-300 rounded-lg py-2 text-xs font-bold">Analyze</button>
              <button onclick="analyzeMeal('breakfast', true)" class="flex-1 bg-primary-500 text-black rounded-lg py-2 text-xs font-bold">Consumed</button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-gray-400 uppercase font-black tracking-wider mb-2">Lunch</label>
            <textarea id="lunch" rows="5" placeholder="Rice, dal, chicken..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg dark:bg-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"></textarea>
            <div class="flex gap-2 mt-2">
              <button onclick="analyzeMeal('lunch', false)" class="flex-1 bg-gray-100 dark:bg-gray-900 text-gray-700 dark:text-gray-300 rounded-lg py-2 text-xs font-bold">Analyze</button>
              <button onclick="analyzeMeal('lunch', true)" class="flex-1 bg-primary-500 text-black rounded-lg py-2 text-xs font-bold">Consumed</button>
            </div>
          </div>
          <div>
            <label class="block text-xs text-gray-400 uppercase font-black tracking-wider mb-2">Dinner</label>
            <textarea id="dinner" rows="5" placeholder="Roti, paneer, salad..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg dark:bg-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"></textarea>
            <div class="flex gap-2 mt-2">
              <button onclick="analyzeMeal('dinner', false)" class="flex-1 bg-gray-100 dark:bg-gray-900 text-gray-700 dark:text-gray-300 rounded-lg py-2 text-xs font-bold">Analyze</button>
              <button onclick="analyzeMeal('dinner', true)" class="flex-1 bg-primary-500 text-black rounded-lg py-2 text-xs font-bold">Consumed</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm">
        <h2 class="text-lg font-black text-gray-900 dark:text-white mb-4">AI Analysis</h2>
        <div id="analysis-empty" class="text-sm text-gray-500 dark:text-gray-400">Analyze a meal to see calories, protein, and better hostel choices.</div>
        <div id="analysis-card" class="hidden space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-primary-50 dark:bg-primary-900/20 rounded-lg p-3">
              <p class="text-[10px] uppercase font-black text-primary-600 dark:text-primary-400">Calories</p>
              <p id="macro-calories" class="text-2xl font-black text-gray-900 dark:text-white">--</p>
            </div>
            <div class="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-3">
              <p class="text-[10px] uppercase font-black text-blue-600 dark:text-blue-400">Protein</p>
              <p id="macro-protein" class="text-2xl font-black text-gray-900 dark:text-white">--</p>
            </div>
            <div class="bg-amber-50 dark:bg-amber-900/20 rounded-lg p-3">
              <p class="text-[10px] uppercase font-black text-amber-600 dark:text-amber-400">Carbs</p>
              <p id="macro-carbs" class="text-2xl font-black text-gray-900 dark:text-white">--</p>
            </div>
            <div class="bg-rose-50 dark:bg-rose-900/20 rounded-lg p-3">
              <p class="text-[10px] uppercase font-black text-rose-600 dark:text-rose-400">Fat</p>
              <p id="macro-fat" class="text-2xl font-black text-gray-900 dark:text-white">--</p>
            </div>
          </div>
          <div class="border-t border-gray-100 dark:border-gray-700 pt-4">
            <p id="analysis-levels" class="text-sm font-bold text-gray-900 dark:text-white mb-2"></p>
            <p id="analysis-suggestion" class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase font-black tracking-wider mb-2">Choose</p>
            <div id="choose-list" class="flex flex-wrap gap-2"></div>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase font-black tracking-wider mb-2">Avoid</p>
            <div id="avoid-list" class="flex flex-wrap gap-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=3"></script>
  <script>
    const userId = getUserId();

    async function loadMenu() {
      if (!userId) { window.location.href = 'auth.html'; return; }
      showAppLoading('Checking Hostel Mode...');
      const profileRes = await fetch(`${API_BASE_URL}/user/profile?user_id=${userId}`);
      if (profileRes.ok) {
        const profile = await profileRes.json();
        if (!profile.uses_hostel) {
          localStorage.setItem('uses_hostel', 'false');
          window.location.href = 'dashboard.html';
          return;
        }
      }
      const res = await fetch(`${API_BASE_URL}/hostel/menu?user_id=${userId}`);
      if (!res.ok) {
        if (res.status === 403) window.location.href = 'dashboard.html';
        return;
      }
      const data = await res.json();
      document.getElementById('breakfast').value = data.breakfast || '';
      document.getElementById('lunch').value = data.lunch || '';
      document.getElementById('dinner').value = data.dinner || '';
      hideAppLoading();
    }

    async function saveMenu() {
      const payload = {
        user_id: userId,
        breakfast: document.getElementById('breakfast').value,
        lunch: document.getElementById('lunch').value,
        dinner: document.getElementById('dinner').value
      };
      const res = await fetch(`${API_BASE_URL}/hostel/menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Failed to save menu'); return; }
    }

    async function analyzeMeal(mealType, markConsumed) {
      const items = document.getElementById(mealType).value.trim();
      if (!items) { alert(`Enter ${mealType} menu first.`); return; }
      const res = await fetch(`${API_BASE_URL}/hostel/analyze-menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, meal_type: mealType, items, mark_consumed: markConsumed })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Analysis failed'); return; }
      renderAnalysis(data);
      if (markConsumed) saveMenu();
    }

    function pill(text, color) {
      return `<span class="px-2.5 py-1 rounded-full text-xs font-bold ${color}">${text}</span>`;
    }

    function renderAnalysis(data) {
      document.getElementById('analysis-empty').classList.add('hidden');
      document.getElementById('analysis-card').classList.remove('hidden');
      document.getElementById('macro-calories').textContent = data.macros.calories;
      document.getElementById('macro-protein').textContent = `${data.macros.protein_g}g`;
      document.getElementById('macro-carbs').textContent = `${data.macros.carbs_g}g`;
      document.getElementById('macro-fat').textContent = `${data.macros.fat_g}g`;
      document.getElementById('analysis-levels').textContent = `Protein: ${data.analysis.protein_level} | Calories: ${data.analysis.calorie_level}`;
      document.getElementById('analysis-suggestion').textContent = data.analysis.suggestion;
      document.getElementById('choose-list').innerHTML = (data.analysis.choose || []).map(item => pill(item, 'bg-primary-100 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300')).join('');
      document.getElementById('avoid-list').innerHTML = (data.analysis.avoid || []).length
        ? data.analysis.avoid.map(item => pill(item, 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300')).join('')
        : pill('Nothing specific', 'bg-gray-100 text-gray-600 dark:bg-gray-900 dark:text-gray-300');
      feather.replace();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMenu().finally(hideAppLoading);
      feather.replace();
    });
  </script>
</body>
</html>
