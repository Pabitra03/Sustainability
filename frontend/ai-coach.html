<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.theme==="dark"||(!localStorage.theme&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}</script>
  <style>html { background-color: #050505 !important; } html:not(.dark) { background-color: #fafafa !important; }</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability | AI Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: { 50: '#f7fee7', 100: '#ecfccb', 500: '#84cc16', 600: '#65a30d', 900: '#365314' }, secondary: { 500: '#3b82f6' } }, fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-[#fafafa] dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div id="app-shell" class="w-full h-full">
    <div class="max-w-5xl mx-auto h-[calc(100vh-7rem)] flex flex-col">
      <div class="mb-5">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">AI Coach</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Personal coaching from BMI, BMR, TDEE, goal, progress, and diet preference.</p>
      </div>

      <div id="coach-messages" class="flex-1 overflow-y-auto bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 sm:p-6 space-y-4 shadow-sm">
        <div class="max-w-[85%] bg-gray-100 dark:bg-gray-900 rounded-xl p-4 text-sm text-gray-700 dark:text-gray-300">
          Ask me about today's food choices, protein, calories, water, or weight prediction.
        </div>
      </div>

      <div class="mt-3 flex gap-2 overflow-x-auto pb-1">
        <button type="button" onclick="sendQuickPrompt('What should I do right now?')" class="shrink-0 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-2 rounded-lg text-xs font-bold text-gray-700 dark:text-gray-300">Right now</button>
        <button type="button" onclick="sendQuickPrompt('Am I under protein today?')" class="shrink-0 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-2 rounded-lg text-xs font-bold text-gray-700 dark:text-gray-300">Protein</button>
        <button type="button" onclick="sendQuickPrompt('How much water should I drink?')" class="shrink-0 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-2 rounded-lg text-xs font-bold text-gray-700 dark:text-gray-300">Water</button>
        <button type="button" onclick="sendQuickPrompt('Forecast my weight')" class="shrink-0 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-2 rounded-lg text-xs font-bold text-gray-700 dark:text-gray-300">Weight</button>
        <button type="button" onclick="sendQuickPrompt('Make a cheap high protein day')" class="shrink-0 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-2 rounded-lg text-xs font-bold text-gray-700 dark:text-gray-300">Budget plan</button>
      </div>

      <form id="coach-form" class="mt-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-3 shadow-sm flex items-end gap-3">
        <textarea id="coach-input" rows="2" placeholder="Ask your coach..." class="flex-1 resize-none bg-transparent px-2 py-2 text-sm text-gray-900 dark:text-white focus:outline-none"></textarea>
        <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-black p-3 rounded-lg font-bold flex items-center justify-center">
          <i data-feather="send" class="w-5 h-5"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="js/app.js?v=3"></script>
  <script>
    function addMessage(role, message) {
      const wrap = document.createElement('div');
      const isUser = role === 'user';
      wrap.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      wrap.innerHTML = `
        <div class="max-w-[85%] rounded-xl p-4 text-sm leading-relaxed whitespace-pre-line ${isUser ? 'bg-primary-500 text-black' : 'bg-gray-100 dark:bg-gray-900 text-gray-700 dark:text-gray-300'}">
          ${escapeHtml(message)}
        </div>
      `;
      const messages = document.getElementById('coach-messages');
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadHistory() {
      const userId = getUserId();
      if (!userId) { window.location.href = 'auth.html'; return; }

      const lastUser = localStorage.getItem('ai_coach_last_user_id');
      if (!lastUser || lastUser !== String(userId)) {
        document.getElementById('coach-messages').innerHTML = "";
        localStorage.removeItem('ai_coach_messages');
      }
      localStorage.setItem('ai_coach_last_user_id', String(userId));

      try {
        const res = await fetch(`${API_BASE_URL}/ai/history?user_id=${userId}`);
        if (!res.ok) return;
        const data = await res.json();
        const msgs = data.messages || [];
        localStorage.setItem('ai_coach_messages', JSON.stringify(msgs));

        document.getElementById('coach-messages').innerHTML = `<div class="max-w-[85%] bg-gray-100 dark:bg-gray-900 rounded-xl p-4 text-sm text-gray-700 dark:text-gray-300">Ask me about today's food choices, protein, calories, water, or weight prediction.</div>`;
        msgs.forEach(item => addMessage(item.role, item.message));
      } catch (e) {
        console.error("Coach history unavailable:", e);
      }
    }

    function sendQuickPrompt(message) {
      const input = document.getElementById('coach-input');
      input.value = message;
      document.getElementById('coach-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      document.getElementById('coach-form').addEventListener('submit', async e => {
        e.preventDefault();
        const input = document.getElementById('coach-input');
        const message = input.value.trim();
        if (!message) return;
        input.value = '';
        addMessage('user', message);
        addMessage('assistant', 'Thinking through your current profile...');
        const last = document.querySelector('#coach-messages').lastElementChild;

        try {
          const res = await fetch(`${API_BASE_URL}/ai/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: getUserId(), message })
          });
          const data = await res.json();
          last.remove();
          addMessage('assistant', data.reply || data.error || 'I could not generate a coach response right now.');
        } catch (err) {
          last.remove();
          addMessage('assistant', 'Coach service is unavailable right now. Try again after the backend is running.');
        }
      });
      feather.replace();
    });
  </script>
</body>
</html>
